# ── Nginx config for IP-only deployment (no domain, no SSL) ──────────────────
#
# Use this while the domain is being processed.
# When the domain is ready, switch to nginx.conf and run certbot.
#
# Install:
#   sudo cp nginx-ip.conf /etc/nginx/sites-available/elevate
#   sudo ln -sf /etc/nginx/sites-available/elevate /etc/nginx/sites-enabled/elevate
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Access:
#   Main site:  http://YOUR_SERVER_IP
#   Test Lab:   http://YOUR_SERVER_IP:8080
# ─────────────────────────────────────────────────────────────────────────────

# ── Main site ─────────────────────────────────────────────────────────────────
server {
    listen 80 default_server;
    server_name _;

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# ── Test Lab ──────────────────────────────────────────────────────────────────
server {
    listen 8080;
    server_name _;

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3001;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
