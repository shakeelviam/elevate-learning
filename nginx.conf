# ── Nginx configuration for Elevate Learning on Contabo VPS ──────────────────
#
# Place this file at: /etc/nginx/sites-available/elevate
# Enable:  sudo ln -s /etc/nginx/sites-available/elevate /etc/nginx/sites-enabled/
# Test:    sudo nginx -t
# Reload:  sudo systemctl reload nginx
#
# Prerequisites:
#   sudo apt install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com -d testlab.yourdomain.com
#
# Replace ALL occurrences of "yourdomain.com" with your actual domain.
# ─────────────────────────────────────────────────────────────────────────────

# ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com testlab.yourdomain.com;
    return 301 https://$host$request_uri;
}

# ── Main site (yourdomain.com) ────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # SSL — filled in automatically by certbot
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static assets — long cache
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /favicon.ico {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 1d;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         "upgrade";
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_read_timeout 60s;
    }
}

# ── Test Lab (testlab.yourdomain.com) ─────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name testlab.yourdomain.com;

    # SSL — use same cert if using wildcard, or certbot adds this domain automatically
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers — stricter for the test app
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static assets
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         "upgrade";
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_read_timeout 60s;
    }
}

# ── FastAPI backend — internal only, NOT exposed to the internet ──────────────
# The AI backend (port 8000) is only called by Next.js server-side code.
# Do NOT add a public server block for port 8000.
# Use UFW to block it:  sudo ufw deny 8000
